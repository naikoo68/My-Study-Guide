<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />

    <!-- SPA deep-link restore: if 404.html bounced here with the original path
         encoded as "?/...", rewrite the URL back to that path BEFORE the app
         boots, so refreshing a client-side route keeps you on that route
         instead of landing on the home page. No-op on normal visits. -->
    <script>
      (function () {
        var l = window.location;
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) { return s.replace(/~and~/g, "&"); })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>

    <!-- Connect to the API backend early to cut request latency -->
    <link rel="preconnect" href="https://my-prep-mart-api-39nk.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://my-prep-mart-api-39nk.onrender.com" />
