name: Keep backend awake

# Pings the backend health endpoint every 10 minutes so the free-tier
# server never idles into sleep (Render spins down after ~15 min of no traffic).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          echo "Pinging backend to keep it awake..."
          curl -sS -m 40 https://my-prep-mart-api-39nk.onrender.com/api/health || true
          echo ""
          echo "Done."
