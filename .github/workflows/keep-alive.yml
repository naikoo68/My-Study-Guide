name: Keep API awake

# Render's free plan puts the API to sleep after ~15 minutes of inactivity,
# which causes a slow 30-60s "cold start" for the next visitor. This workflow
# pings the health endpoint on a schedule so the service stays warm.

on:
  schedule:
    # Every 10 minutes. (GitHub may delay scheduled runs during peak load.)
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          echo "Pinging API health endpoint..."
          # Retry a few times in case the service is mid-wakeup.
          curl --fail --silent --show-error --retry 5 --retry-delay 15 --retry-all-errors \
            --max-time 90 \
            https://my-prep-mart-api-39nk.onrender.com/api/health
          echo ""
          echo "Ping complete."
